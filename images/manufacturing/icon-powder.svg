<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Oil Powder / Mountain Icon (like the reference) -->
  <!-- Back mountain -->
  <polygon points="130,160 180,160 155,90" fill="#d4740c" opacity="0.4" stroke="#d4740c" stroke-width="4"/>
  <!-- Front mountain with dots -->
  <polygon points="40,160 140,160 90,60" fill="#d4740c" opacity="0.6" stroke="#d4740c" stroke-width="4"/>
  <!-- Dots on front mountain representing powder particles -->
  <circle cx="75" cy="120" r="5" fill="#fff"/>
  <circle cx="95" cy="100" r="4" fill="#fff"/>
  <circle cx="105" cy="130" r="5" fill="#fff"/>
  <circle cx="85" cy="140" r="4" fill="#fff"/>
  <circle cx="70" cy="145" r="3" fill="#fff"/>
  <circle cx="110" cy="145" r="4" fill="#fff"/>
  <circle cx="90" cy="85" r="3" fill="#fff"/>
</svg>