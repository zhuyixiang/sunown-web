<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Sales - THE SUN OWNER</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .hot-sales-banner {
            padding: 40px 20px;
            background: #fff;
        }
        .banner-box {
            max-width: 900px;
            margin: 0 auto;
            border: 3px dashed #4a90d9;
            border-radius: 15px;
            padding: 30px 40px 25px;
            text-align: center;
        }
        .banner-box h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #d4740c;
            font-style: italic;
            margin-bottom: 25px;
        }
        .banner-img {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .banner-box p {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto;
        }
        .hot-products-section {
            padding: 50px 0 80px;
            background: #fff;
        }
        .hot-products-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }
        .hot-product-card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .hot-product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .hot-product-img {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background: #f5f5f5;
        }
        .hot-product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hot-product-name {
            padding: 12px 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            color: #333;
            background: #fff;
            line-height: 1.3;
        }
        @media (max-width: 1200px) {
            .hot-products-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 992px) {
            .hot-products-grid { grid-template-columns: repeat(3, 1fr); }
            .banner-box h1 { font-size: 2.2rem; }
        }
        @media (max-width: 768px) {
            .hot-products-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .banner-box { padding: 20px 15px; }
            .banner-box h1 { font-size: 1.8rem; }
            .banner-box p { font-size: 0.85rem; }
            .hot-product-name { font-size: 0.8rem; padding: 10px 8px; }
        }
        @media (max-width: 480px) {
            .hot-products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .hot-product-name { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="hot-sales-banner">
        <div class="banner-box">
            <h1>Hot Sales</h1>
<!--            <img src="https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?w=600&q=80" alt="Hot Sales" class="banner-img">-->
<!--            <p>We are an enthusiastic importer of softgel ingredients from all over the world, including Asia, India, Europe and South America. We make sure to choose the highest quality softgel products from the best regions, so the ingredients will be the most effective for human use. By partnering with us, you can trust that your products will be enriched with meticulously chosen ingredients from the best regions worldwide, guaranteeing superior results and customer satisfaction.</p>-->
        </div>
    </section>

    <section class="hot-products-section">
        <div class="container">
            <div class="hot-products-grid">
                <div class="hot-product-card">
                    <div class="hot-product-img"><img src="images/hot/L-Theanine.png" alt="L-Theanine"></div>
                    <div class="hot-product-name">L-Theanine</div>
                </div>
                <div class="hot-product-card">
                    <div class="hot-product-img"><img src="images/hot/L-Citrulline.png" alt="L-Citrulline"></div>
                    <div class="hot-product-name">L-Citrulline</div>
                </div>
                <div class="hot-product-card">
                    <div class="hot-product-img"><img src="images/hot/MCT%20Oil.jpg" alt="MCT Oil"></div>
                    <div class="hot-product-name">MCT Oil</div>
                </div>
                <div class="hot-product-card">
                    <div class="hot-product-img"><img src="images/hot/Coenzyme%20Q10.jpg" alt="Coenzyme Q10"></div>
                    <div class="hot-product-name">Coenzyme Q10</div>
                </div>
                <div class="hot-product-card">
                    <div class="hot-product-img"><img src="images/hot/Creatine.jpg" alt="Creatine"></div>
                    <div class="hot-product-name">Creatine</div>
                </div>
                <div class="hot-product-card">
                    <div class="hot-product-img"><img src="images/hot/Collagen.jpg" alt="Collagen"></div>
                    <div class="hot-product-name">Collagen</div>
                </div>
                <div class="hot-product-card">
                    <div class="hot-product-img"><img src="images/hot/L-Carnitine%20hydrochloride.png" alt="L-Carnitine hydrochloride"></div>
                    <div class="hot-product-name">L-Carnitine hydrochloride</div>
                </div>
                <div class="hot-product-card">
                    <div class="hot-product-img"><img src="images/hot/Berberine%20HCL.jpg" alt="Berberine HCL"></div>
                    <div class="hot-product-name">Berberine HCL</div>
                </div>
                <div class="hot-product-card">
                    <div class="hot-product-img"><img src="images/hot/Fish%20Oil%20Powder.jpg" alt="Fish Oil Powder"></div>
                    <div class="hot-product-name">Fish Oil Powder</div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="js/components.js"></script>
</body>
</html>
